apiVersion: apps/v1
kind: Deployment

metadata:
  name: produits

spec:
  replicas: 2

  selector:
    matchLabels:
      app: produits

  template:
    metadata:
      labels:
        app: produits

    spec:
      containers:
      - name: produits
        image: produits:v1
        imagePullPolicy: Never

        ports:
        - containerPort: 3000