name: CI-CD

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Produits
      run: |
        cd service-produits
        npm install

    - name: Install Commandes
      run: |
        cd service-commandes
        npm install